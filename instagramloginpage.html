<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#fafafa;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:350px;
}

.login-box{
    background:white;
    border:1px solid #dbdbdb;
    padding:40px;
    text-align:center;
}

.logo{
    font-size:40px;
    font-family:cursive;
    margin-bottom:30px;
}

input{
    width:100%;
    padding:12px;
    margin:6px 0;
    border:1px solid #dbdbdb;
    border-radius:4px;
    background:#fafafa;
}

button{
    width:100%;
    padding:12px;
    background:#0095f6;
    color:white;
    border:none;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    background:#0077cc;
    transition:0.3s;
}

.or{
    margin:20px 0;
    color:gray;
    font-weight:bold;
}

.facebook{
    text-decoration:none;
    color:#385185;
    font-weight:bold;
    display:block;
    margin-bottom:15px;
}

.forgot{
    text-decoration:none;
    color:#00376b;
    font-size:12px;
}

.signup{
    background:white;
    border:1px solid #dbdbdb;
    text-align:center;
    padding:20px;
    margin-top:10px;
}

.signup a{
    text-decoration:none;
    color:#0095f6;
    font-weight:bold;
}
</style>

</head>
<body>

<div class="container">

    <div class="login-box">
        <h1 class="logo">Instagram</h1>

        <form>
            <input type="text" placeholder="Phone number, username, or email">
            <input type="password" placeholder="Password">

            <button type="submit">Log In</button>
        </form>

        <div class="or">OR</div>

        <a href="#" class="facebook">Log in with Facebook</a>
        <a href="#" class="forgot">Forgot password?</a>
    </div>

    <div class="signup">
        <p>Don't have an account? <a href="#">Sign up</a></p>
    </div>

</div>

</body>
</html>
