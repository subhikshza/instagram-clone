<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram Sign Up</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#fafafa;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:350px;
}

.signup-box{
    background:#fff;
    border:1px solid #dbdbdb;
    padding:40px;
    text-align:center;
}

.logo{
    font-size:45px;
    font-family:cursive;
    margin-bottom:15px;
}

.subtitle{
    color:#737373;
    font-size:16px;
    font-weight:bold;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:6px 0;
    border:1px solid #dbdbdb;
    border-radius:4px;
    background:#fafafa;
    outline:none;
}

input:focus{
    border-color:#0095f6;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    background:#0095f6;
    color:white;
    border:none;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.03);
}

.or{
    margin:20px 0;
    color:#737373;
    font-weight:bold;
}

.terms{
    font-size:12px;
    color:#737373;
    margin-top:15px;
    line-height:1.5;
}

.login-box{
    background:#fff;
    border:1px solid #dbdbdb;
    text-align:center;
    padding:20px;
    margin-top:10px;
}

.login-box a{
    text-decoration:none;
    color:#0095f6;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

    <div class="signup-box">
        <h1 class="logo">Instagram</h1>

        <p class="subtitle">
            Sign up to see photos and videos from your friends.
        </p>

        <form>
            <input type="email" placeholder="Mobile Number or Email">

            <input type="text" placeholder="Full Name">

            <input type="text" placeholder="Username">

            <input type="password" placeholder="Password">

            <button type="submit">Sign Up</button>
        </form>

        <p class="terms">
            By signing up, you agree to our Terms, Privacy Policy and Cookies Policy.
        </p>
    </div>

    <div class="login-box">
        <p>
            Have an account?
            <a href="#">Log In</a>
        </p>
    </div>

</div>

</body>
</html>
