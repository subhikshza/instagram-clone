<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Profile</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="page">

    <!-- Profile Header -->
    <section class="profile">

        <div class="profile-image">
            <img src="pfp.png" alt="Profile">
        </div>

        <div class="profile-info">

            <div class="username-row">
                <h1>clove</h1>
                <button>Edit profile</button>
                <button class="icon-btn">⚙</button>
            </div>

            <div class="stats">
                <span><b>245</b> posts</span>
                <span><b>12.5k</b> followers</span>
                <span><b>530</b> following</span>
            </div>

            <div class="bio">
                <b>Clove</b>
                <p>
                    Digital creator ✨<br>
                    Welcome to my profile<br>
                    📍 Earth
                </p>

                <a href="#">example.com</a>
            </div>

        </div>

    </section>


    <!-- Stories -->

    <section class="stories">

        <div class="story">
            <div class="circle">
                <img src="pfp.png" alt="Profile">
            </div>
            <p>Travel</p>
        </div>

        <div class="story">
            <div class="circle">
                <img src="pfp.png" alt="Profile">
            </div>
            <p>Food</p>
        </div>

        <div class="story">
            <div class="circle">
                <img src="pfp.png" alt="Profile">
            </div>
            <p>Life</p>
        </div>

        <div class="story">
            <div class="circle add">
                +
            </div>
            <p>New</p>
        </div>

    </section>



    <!-- Tabs -->

    <div class="tabs">

        <div class="active">
            ▦ POSTS
        </div>

        <div>
            🎬 REELS
        </div>

        <div>
            👤 TAGGED
        </div>

    </div>



    <!-- Photo Grid -->

    <section class="grid">

        <img src="pfp.png" alt="Profile">
        <img src="pfp.png" alt="Profile">
        <img src="pfp.png" alt="Profile">

        <img src="pfp.png" alt="Profile">
        <img src="pfp.png" alt="Profile">
        <img src="pfp.png" alt="Profile">

        <img src="pfp.png" alt="Profile">
        <img src="pfp.png" alt="Profile">
        <img src="pfp.png" alt="Profile">

    </section>


</div>


</body>
</html>
